<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Admin</title><link rel='stylesheet' href='../css/styles.css'></head><body><header><nav class='container navbar'><div class='logo'>Yogur<span>ASO</span> Admin</div><ul class='nav-links'><li><a href='../index.html'>Ver Tienda</a></li><li><button id='btn-logout' class='btn-link'>Cerrar Sesión</button></li></ul></nav></header><main class='container admin-panel'><div class='admin-header'><h1>Gestión de Inventario</h1><button class='btn btn-primary' id='btn-nuevo-producto'>+ Nuevo Yogur</button></div><div class='admin-table-container'><table class='admin-table'><thead><tr><th>ID</th><th>Producto</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr></thead><tbody id='admin-productos-lista'></tbody></table></div></main><div id='modal-producto' class='modal'><div class='modal-content'><div class='modal-header'><h2>Añadir Producto</h2><span class='close-modal'>&times;</span></div><form id='form-producto'><div class='form-group'><label>Nombre</label><input type='text' id='p-nombre' required></div><div class='form-row'><div class='form-group'><label>Precio</label><input type='number' id='p-precio' required></div><div class='form-group'><label>Stock</label><input type='number' id='p-stock' required></div></div><div class='form-group'><label>Categoría</label><select id='p-categoria'><option value='1'>Natural</option><option value='2'>Con Frutas</option><option value='3'>Griego</option><option value='4'>Sin Lactosa</option></select></div><div class='form-group'><label>Descripción</label><textarea id='p-descripcion' rows='3'></textarea></div><button type='submit' class='btn btn-primary btn-block'>Guardar</button></form></div></div><script type='module' src='../js/admin.js'></script></body></html>
